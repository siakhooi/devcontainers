name: Build GO 1.25

env:
  BUILD_CONTEXT: ./go125

on:
  workflow_dispatch:
    inputs:
      push-images:
        description: "Push built images to registries"
        required: true
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - "go125/**"
      - "variables.env"
  pull_request:
    branches:
      - main
    paths:
      - "go125/**"
      - "variables.env"

  workflow_call:
    secrets:
      REGISTRY_PASSWORD_DOCKER:
        required: true
      PUBLISH_TO_GITHUB_REPO_TOKEN:
        required: true
    inputs:
      push-images:
        required: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SHOULD_PUSH: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || inputs.push-images || false }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - run: ls -l
      - run: cat ./variables.env >> $GITHUB_ENV
      - run: cat ${{ env.BUILD_CONTEXT }}/variables.env >> $GITHUB_ENV

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: ${{ env.SHOULD_PUSH }}
        with:
          username: ${{ env.REGISTRY_USERNAME_DOCKER }}
          password: ${{ secrets.REGISTRY_PASSWORD_DOCKER }}

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: ${{ env.SHOULD_PUSH }}
        with:
          registry: ghcr.io
          username: ${{ env.REGISTRY_USERNAME_GHCR }}
          password: ${{ secrets.PUBLISH_TO_GITHUB_REPO_TOKEN }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ env.BUILD_CONTEXT }}
          push: ${{ env.SHOULD_PUSH }}
          tags: |
            ${{ env.REGISTRY_USERNAME_DOCKER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.REGISTRY_USERNAME_GHCR }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
